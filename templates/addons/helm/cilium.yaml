apiVersion: addons.cluster.x-k8s.io/v1alpha1
kind: HelmChartProxy
metadata:
  name: ${CLUSTER_NAME}-cilium
spec:
  clusterSelector:
    matchLabels:
      cni: ${CLUSTER_NAME}-cilium
  repoURL: https://helm.cilium.io/
  chartName: cilium
  releaseName: cilium
  namespace: kube-system
  version: "1.17.0"
  options:
    wait: true
    waitForJobs: true
    timeout: 10m
  valuesTemplate: |
    kubeProxyReplacement: true
    operator:
      replicas: 1
    rollOutCiliumPods: true
    nodeinit:
      enabled: true
    cni:
      install: true