apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: ${CLUSTER_NAME}-ccm-manifests
  labels:
    cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
spec:
  clusterSelector:
    matchLabels:
      ccm: ${CLUSTER_NAME}-vultr
  resources:
  - kind: ConfigMap
    name: vultr-ccm-manifests
  strategy: Reconcile
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vultr-ccm-manifests
data:
  manifests: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: vultr-ccm
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      annotations:
        rbac.authorization.kubernetes.io/autoupdate: "true"
      name: system:vultr-ccm
    rules:
      - apiGroups:
          - ""
        resources:
          - events
        verbs:
          - create
          - patch
          - update
      - apiGroups:
          - ""
        resources:
          - nodes
        verbs:
          - '*'
      - apiGroups:
          - ""
        resources:
          - nodes/status
        verbs:
          - patch
      - apiGroups:
          - ""
        resources:
          - services
        verbs:
          - list
          - patch
          - update
          - watch
      - apiGroups:
          - ""
        resources:
          - services/status
        verbs:
          - list
          - patch
          - update
          - watch
      - apiGroups:
          - ""
        resources:
          - serviceaccounts
        verbs:
          - create
          - get
      - apiGroups:
          - ""
        resources:
          - persistentvolumes
        verbs:
          - get
          - list
          - update
          - watch
      - apiGroups:
          - ""
        resources:
          - endpoints
        verbs:
          - create
          - get
          - list
          - watch
          - update
      - apiGroups:
          - coordination.k8s.io
        resources:
          - leases
        verbs:
          - create
          - get
          - list
          - watch
          - update
      - apiGroups:
          - ""
        resources:
          - secrets
        verbs:
          - get
          - list
          - watch
    ---
    kind: ClusterRoleBinding
    apiVersion: rbac.authorization.k8s.io/v1
    metadata:
      name: system:vultr-ccm
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:vultr-ccm
    subjects:
      - kind: ServiceAccount
        name: vultr-ccm
        namespace: kube-system
    ---
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: vultr-ccm
      labels:
        app: vultr-ccm
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          app: vultr-ccm
      template:
        metadata:
          labels:
            app: vultr-ccm
        spec:
          serviceAccountName: vultr-ccm
          tolerations:
            - key: "CriticalAddonsOnly"
              operator: "Exists"
            - operator: "Exists"
              effect: "NoExecute"
            - operator: "Exists"
              effect: "NoSchedule"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
          hostNetwork: true
          containers:
            - image: vultr/vultr-cloud-controller-manager:v0.17.0
              imagePullPolicy: Always
              name: vultr-cloud-controller-manager
              command:
                - "/vultr-cloud-controller-manager"
                - "--cloud-provider=vultr"
                - "--allow-untagged-cloud=true"
                - "--authentication-skip-lookup=true"
                - "--v=3"
              env:
                - name: VULTR_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: vultr-${CLUSTER_NAME}-ccm-secret
                      key: api-key
---
apiVersion: v1
kind: Secret
metadata:
  name: vultr-${CLUSTER_NAME}-ccm-secret
  namespace: default
type: addons.cluster.x-k8s.io/resource-set
stringData:
  vultr-ccm.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: vultr-${CLUSTER_NAME}-ccm-secret
      namespace: kube-system
    type: Opaque
    stringData:
      api-key: ${VULTR_API_KEY}
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: ${CLUSTER_NAME}-ccm-secret
  labels:
    cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
spec:
  clusterSelector:
    matchLabels:
      ccm: ${CLUSTER_NAME}-vultr
  resources:
  - kind: Secret
    name: vultr-${CLUSTER_NAME}-ccm-secret
  strategy: Reconcile